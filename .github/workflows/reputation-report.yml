name: Weekly Reputation Report

on:
  schedule:
    # Ponedjeljak 07:00 UTC = 9:00 Zagreb (CEST)
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: opsis-reputation
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Write credentials
        env:
          OAUTH_JSON: ${{ secrets.OAUTH_JSON }}
          SMTP_JSON: ${{ secrets.SMTP_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$OAUTH_JSON" > credentials/oauth.json
          printf '%s' "$SMTP_JSON" > credentials/smtp.json

      - run: node src/reputation_report.js

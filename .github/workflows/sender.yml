name: Opsis Bulk Sender

on:
  schedule:
    # */30 6-16 * * *  = svakih 30 min od 8:00 do 18:30 Zagreb (CEST = UTC+2)
    # 22 attempts/dan. Run traje max 25 min → cijena 30-min slot dostatan.
    - cron: '*/30 6-16 * * *'
  workflow_dispatch:

concurrency:
  group: opsis-sender
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Write credentials
        env:
          OAUTH_JSON: ${{ secrets.OAUTH_JSON }}
          SMTP_JSON: ${{ secrets.SMTP_JSON }}
          BULKEMAIL_API_KEY: ${{ secrets.BULKEMAIL_API_KEY }}
        run: |
          mkdir -p credentials state
          printf '%s' "$OAUTH_JSON" > credentials/oauth.json
          printf '%s' "$SMTP_JSON" > credentials/smtp.json
          printf '{"api_key":"%s"}' "$BULKEMAIL_API_KEY" > credentials/bulkemailchecker.json

      - run: node src/send.js
